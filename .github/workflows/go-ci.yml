name: Go CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -buildvcs=false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download deps
        run: go mod tidy

      - name: Verify go.mod/go.sum unchanged
        run: |
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: |
          dirs=""
          for d in ./cmd ./internal ./tests; do
            [ -d "$d" ] && dirs="$dirs $d"
          done
          unformatted=$(gofmt -l $dirs)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -count=1

      - name: BDD tests
        run: |
          if [ -d ./tests/bdd ] && ls ./tests/bdd/*.go >/dev/null 2>&1; then
            go test -tags=bdd ./tests/bdd/... -count=1
          else
            echo "No BDD tests found, skipping"
          fi

      - name: Build
        run: go build -v ./cmd/readwise
